{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container my-4">
    <div class="row">
        <!-- All Categories -->
        

        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12" style="padding-right: 0 !important; padding-left: 0 !important;">
            <div class="company-logo">
                <ul>
                    {% for cat in categories %}
                    <li class="has-border" style="position: relative; text-align: center;">
                        <figure style="position: relative;">
                            <a href="{% url 'filter_by_category' cat.id %}">
                                {% if cat.category_image %}
                                    <img src="{{ cat.category_image.url }}" height="125" class="attachment-full size-full wp-post-image" alt="">
                                {% else %}
                                    <img src="{% static 'images/placeholder-square.jpg' %}" height="125" class="attachment-full size-full wp-post-image" alt="">
                                {% endif %}
                                <figcaption style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(0, 0, 0, 0.3); padding: 5px 10px; border-radius: 5px; width: 80%;line-height: 16px;">
                                    {{ cat.category_name }}
                                </figcaption>
                            </a>
                        </figure>
                    </li>
                    {% endfor %}
                </ul> 
            </div>
        </div>
        


    </div>
</div>
{% endblock %}
